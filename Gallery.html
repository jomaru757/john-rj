<!DOCTYPE html>
<html>
<head>
    <title>Gallery</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url("tulips.png");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        h1 {
            background-color: rgba(128, 0, 128, 0.7);
            color: white;
            padding: 20px;
            margin: 0;
        }

        .gallery {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 25px;
            padding: 40px;
        }

        .card {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            width: 220px;
            transition: 0.4s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .card:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 30px rgba(128, 0, 128, 0.6);
        }

        .caption {
            padding: 10px;
            font-weight: bold;
            color: purple;
            background: rgba(255,255,255,0.6);
        }

        a {
            display: inline-block;
            margin: 20px;
            padding: 10px 20px;
            background: purple;
            color: white;
            text-decoration: none;
            border-radius: 30px;
        }

        .card:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 30px rgba(128, 0, 128, 0.6);  

        }
        a:hover {
            background: darkviolet;
        }
        
    </style>
</head>

<body>
<h1>My Tulip Gallery 🌷💜</h1>

<div class="gallery">

    <div class="card">
        <img src="1e88b40a-ff63-426c-b192-983a94996b71.jpg">
        <div class="caption">Tulip 1 🌸</div>
    </div>

    <div class="card">
        <img src="f10b704e-8c74-49f2-b7af-912f72db3408.jpg">
        <div class="caption">Arbie 🌷</div>
    </div>

    <div class="card">
        <img src="8a1269e1-9104-482f-9eb1-dd9db1641990.jpg">
        <div class="caption">Arbie 💜</div>
    </div>

    <div class="card">
        <img src="b718ace8-50be-4121-99d9-f74a1e0eb76e.jpg">
        <div class="caption">Arbie ✨</div>
    </div>

    <div class="card">
        <img src="5efc9c22-0bf9-4431-a742-ba7b90b08b8f.jpg">
        <div class="caption">Arbie 🌺</div>
    </div>

</div>

<a href="my first website.html">← Back to Home</a>

</body>
</html>
